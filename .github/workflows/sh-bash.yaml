name: "sh/bash lint"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  sh-bash:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: "read"
    defaults:
      run:
        shell: "bash"
    env:
      SHELLCHECK_VERSION: "v0.11.0"
      SHFMT_VERSION: "v3.13.1"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "actions/setup-go@v6"
        with:
          go-version: 1.25
      - name: "Install ShellCheck"
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ -C "${RUNNER_TEMP}"
          cp "${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}/shellcheck" "${RUNNER_TEMP}/bin/shellcheck"
          chmod +x "${RUNNER_TEMP}/bin/shellcheck"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
      - name: "Install shfmt"
        run: |
          go install "mvdan.cc/sh/v3/cmd/shfmt@${SHFMT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: "Run sh/bash lint"
        run: "./.github/scripts/lint_sh_bash.sh"
