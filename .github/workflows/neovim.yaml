name: Neovim

on:
  push:
    branches:
      - master
      - main
    paths:
      - home/.config/nvim/**
      - .github/workflows/neovim.yaml
  pull_request:
    paths:
      - home/.config/nvim/**
      - .github/workflows/neovim.yaml
  schedule:
    - cron: 0 0 * * 1
  workflow_dispatch:

jobs:
  neovim:
    name: Neovim ${{ matrix.neovim }}
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    container:
      image: archlinux:latest

    strategy:
      fail-fast: false
      matrix:
        neovim:
          - stable
          - nightly

    continue-on-error: ${{ matrix.neovim == 'nightly' }}

    env:
      NVIM_CONFIG_DIR: home/.config/nvim
      HOME: /tmp/neovim-${{ matrix.neovim }}/home
      XDG_CONFIG_HOME: /tmp/neovim-${{ matrix.neovim }}/xdg-config
      XDG_DATA_HOME: /tmp/neovim-${{ matrix.neovim }}/xdg-data
      XDG_STATE_HOME: /tmp/neovim-${{ matrix.neovim }}/xdg-state
      XDG_CACHE_HOME: /tmp/neovim-${{ matrix.neovim }}/xdg-cache

    steps:
      - name: Install system dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed \
            bash zsh git nodejs npm python python-pip \
            base-devel cmake unzip tar gzip curl ripgrep fd

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Neovim ${{ matrix.neovim }}
        shell: bash
        run: |
          install_dir="/tmp/neovim-${{ matrix.neovim }}"

          curl -fsSL \
            "https://github.com/neovim/neovim-releases/releases/download/${{ matrix.neovim }}/nvim-linux-x86_64.tar.gz" \
            | tar -xz -C /tmp

          mv /tmp/nvim-linux-x86_64 "${install_dir}"
          echo "${install_dir}/bin" >> "${GITHUB_PATH}"

      - name: Check Neovim version
        run: |
          nvim --version

      - name: Check lazy-lock.json exists
        run: |
          test -f "${NVIM_CONFIG_DIR}/lazy-lock.json"

      - name: Prepare isolated config
        run: |
          mkdir -p \
            "${HOME}" \
            "${XDG_CONFIG_HOME}" \
            "${XDG_DATA_HOME}" \
            "${XDG_STATE_HOME}" \
            "${XDG_CACHE_HOME}"
          cp -R "${NVIM_CONFIG_DIR}" "${XDG_CONFIG_HOME}/nvim"

      - name: Restore lazy.nvim plugins from lockfile
        timeout-minutes: 10
        run: |
          nvim --headless "+Lazy! restore" "+qa"

      - name: Load config after plugin restore
        timeout-minutes: 10
        run: |
          nvim --headless "+qa"

      - name: Check lazy-lock.json was not changed
        run: |
          diff -u \
            "${NVIM_CONFIG_DIR}/lazy-lock.json" \
            "${XDG_CONFIG_HOME}/nvim/lazy-lock.json"
