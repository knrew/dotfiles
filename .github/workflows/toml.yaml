name: Lint toml

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  taplo:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-taplo-0.10.0
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.92.0

      - name: Install taplo
        run: |
          if ! command -v taplo >/dev/null || [[ "$(taplo --version)" != "taplo 0.10.0" ]]; then
            cargo install taplo-cli --version 0.10.0 --locked
          fi

      - run: taplo fmt --check
