# https://github.com/catppuccin/yazi/blob/main/themes/latte/catppuccin-latte-blue.toml

[app]
overall = {bg = "#eff1f5"}

[mgr]
cwd = {fg = "#179299"}

find_keyword  = {fg = "#df8e1d", italic = true}
find_position = {bg = "reset", fg = "#ea76cb", italic = true}

marker_copied   = {bg = "#40a02b", fg = "#40a02b"}
marker_cut      = {bg = "#d20f39", fg = "#d20f39"}
marker_marked   = {bg = "#179299", fg = "#179299"}
marker_selected = {bg = "#1e66f5", fg = "#1e66f5"}

count_copied   = {bg = "#40a02b", fg = "#eff1f5"}
count_cut      = {bg = "#d20f39", fg = "#eff1f5"}
count_selected = {bg = "#1e66f5", fg = "#eff1f5"}

border_style  = {fg = "#8c8fa1"}
border_symbol = "в”Ӯ"

syntect_theme = "~/.config/yazi/Catppuccin-latte.tmTheme"

[tabs]
active   = {bg = "#4c4f69", bold = true, fg = "#eff1f5"}
inactive = {bg = "#bcc0cc", fg = "#4c4f69"}

[mode]
normal_alt  = {bg = "#ccd0da", fg = "#1e66f5"}
normal_main = {bg = "#1e66f5", bold = true, fg = "#eff1f5"}

select_alt  = {bg = "#ccd0da", fg = "#40a02b"}
select_main = {bg = "#40a02b", bold = true, fg = "#eff1f5"}

unset_alt  = {bg = "#ccd0da", fg = "#dd7878"}
unset_main = {bg = "#dd7878", bold = true, fg = "#eff1f5"}

[indicator]
current = {bg = "#1e66f5", fg = "#eff1f5"}
parent  = {bg = "#4c4f69", fg = "#eff1f5"}
preview = {bg = "#4c4f69", fg = "#eff1f5"}

[status]
sep_left  = {close = "оӮҙ", open = "оӮ¶"}
sep_right = {close = "оӮҙ", open = "оӮ¶"}

progress_error  = {bg = "#d20f39", fg = "#df8e1d"}
progress_label  = {bold = true, fg = "#ffffff"}
progress_normal = {bg = "#bcc0cc", fg = "#40a02b"}

perm_exec  = {fg = "#40a02b"}
perm_read  = {fg = "#df8e1d"}
perm_sep   = {fg = "#8c8fa1"}
perm_type  = {fg = "#1e66f5"}
perm_write = {fg = "#d20f39"}

[input]
border   = {fg = "#1e66f5"}
selected = {reversed = true}
title    = {}
value    = {}

[pick]
active   = {fg = "#ea76cb"}
border   = {fg = "#1e66f5"}
inactive = {}

[confirm]
body    = {}
border  = {fg = "#1e66f5"}
btn_no  = {}
btn_yes = {reversed = true}
list    = {}
title   = {fg = "#1e66f5"}

[cmp]
border = {fg = "#1e66f5"}

[tasks]
border  = {fg = "#1e66f5"}
hovered = {bold = true, fg = "#ea76cb"}
title   = {}

[which]
cand            = {fg = "#179299"}
desc            = {fg = "#ea76cb"}
mask            = {bg = "#ccd0da"}
rest            = {fg = "#7c7f93"}
separator       = " оӘң "
separator_style = {fg = "#acb0be"}

[help]
desc    = {fg = "#7c7f93"}
footer  = {bg = "#bcc0cc", fg = "#4c4f69"}
hovered = {bg = "#acb0be", bold = true}
on      = {fg = "#179299"}
run     = {fg = "#ea76cb"}

[notify]
title_error = {fg = "#d20f39"}
title_info  = {fg = "#179299"}
title_warn  = {fg = "#df8e1d"}

[filetype]
rules = [
  # Media
  {fg = "#179299", mime = "image/*"},
  {fg = "#df8e1d", mime = "{audio,video}/*"},

  # Archives
  {fg = "#ea76cb", mime = "application/*zip"},
  {fg = "#ea76cb", mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}"},

  # Documents
  {fg = "#40a02b", mime = "application/{pdf,doc,rtf}"},

  # Virtual file system
  {fg = "#bcc0cc", mime = "vfs/{absent,stale}"},

  # Special file
  {bg = "#d20f39", is = "orphan", url = "*"},
  {fg = "#40a02b", is = "exec", url = "*"},

  # Dummy file
  {bg = "#d20f39", is = "dummy", url = "*"},
  {bg = "#d20f39", is = "dummy", url = "*/"},

  # Fallback
  {fg = "#1e66f5", url = "*/"},
]

[spot]
border   = {fg = "#1e66f5"}
tbl_cell = {fg = "#1e66f5", reversed = true}
tbl_col  = {bold = true}
title    = {fg = "#1e66f5"}

